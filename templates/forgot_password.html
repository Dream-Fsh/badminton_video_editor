<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - 羽毛球视频智能剪辑系统</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .reset-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
        .step-indicator {
            transition: all 0.3s ease;
        }
        .step-indicator.active {
            background: #10b981;
            color: white;
        }
        .step-indicator.completed {
            background: #10b981;
            color: white;
        }
        .step-indicator.inactive {
            background: #e5e7eb;
            color: #6b7280;
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center py-8">
    <div class="reset-card rounded-2xl shadow-2xl p-8 w-full max-w-lg mx-4">
        <!-- Logo区域 -->
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-key text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">找回密码</h1>
            <p class="text-gray-500 mt-2">通过验证重置您的账户密码</p>
        </div>

        <!-- 步骤指示器 -->
        <div class="flex items-center justify-center mb-8">
            <div id="step1-indicator" class="step-indicator active w-8 h-8 rounded-full flex items-center justify-center text-sm font-medium">1</div>
            <div class="w-12 h-0.5 bg-gray-300 mx-2" id="step1-line"></div>
            <div id="step2-indicator" class="step-indicator inactive w-8 h-8 rounded-full flex items-center justify-center text-sm font-medium">2</div>
            <div class="w-12 h-0.5 bg-gray-300 mx-2" id="step2-line"></div>
            <div id="step3-indicator" class="step-indicator inactive w-8 h-8 rounded-full flex items-center justify-center text-sm font-medium">3</div>
        </div>

        <!-- 步骤1：输入用户名 -->
        <form id="step1-form" class="space-y-5">
            <div>
                <label class="block text-gray-700 text-sm font-medium mb-2">
                    <i class="fas fa-user mr-2 text-gray-400"></i>用户名
                </label>
                <input type="text" id="username" name="username" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-green-500 focus:ring-2 focus:ring-green-200 transition-all outline-none"
                    placeholder="请输入您的用户名">
            </div>

            <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span id="errorText"></span>
            </div>

            <button type="submit" id="sendCodeBtn"
                class="w-full bg-green-500 hover:bg-green-600 text-white font-medium py-3 px-4 rounded-lg transition-all transform hover:scale-[1.02] flex items-center justify-center">
                <span id="btn1Text">发送验证码</span>
                <i class="fas fa-spinner fa-spin ml-2 hidden" id="loadingIcon1"></i>
            </button>
        </form>

        <!-- 步骤2：输入验证码和新密码 -->
        <form id="step2-form" class="space-y-5 hidden">
            <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
                <p class="text-sm text-blue-700">
                    <i class="fas fa-info-circle mr-1"></i>
                    验证码已生成，请在下方输入
                </p>
                <!-- 开发模式显示验证码 -->
                <div id="dev-code-display" class="hidden mt-3 text-center">
                    <p class="text-xs text-blue-600 mb-1">开发模式 - 验证码：</p>
                    <span id="dev-code" class="text-2xl font-bold text-blue-800 tracking-widest"></span>
                </div>
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-medium mb-2">
                    <i class="fas fa-shield-alt mr-2 text-gray-400"></i>验证码
                </label>
                <input type="text" id="verificationCode" name="code" required maxlength="6"
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-green-500 focus:ring-2 focus:ring-green-200 transition-all outline-none text-center text-xl tracking-widest"
                    placeholder="请输入6位数字验证码" maxlength="6">
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-medium mb-2">
                    <i class="fas fa-lock mr-2 text-gray-400"></i>新密码
                </label>
                <input type="password" id="newPassword" name="newPassword" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-green-500 focus:ring-2 focus:ring-green-200 transition-all outline-none"
                    placeholder="至少6个字符" minlength="6">
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-medium mb-2">
                    <i class="fas fa-lock mr-2 text-gray-400"></i>确认新密码
                </label>
                <input type="password" id="confirmPassword" name="confirmPassword" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-green-500 focus:ring-2 focus:ring-green-200 transition-all outline-none"
                    placeholder="再次输入新密码">
            </div>

            <div id="errorMsg2" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span id="errorText2"></span>
            </div>

            <div id="successMsg2" class="hidden bg-green-50 border border-green-200 text-green-600 px-4 py-3 rounded-lg text-sm">
                <i class="fas fa-check-circle mr-2"></i>
                <span id="successText2"></span>
            </div>

            <div class="flex space-x-3">
                <button type="button" onclick="goToStep(1)" 
                    class="flex-1 bg-gray-500 hover:bg-gray-600 text-white font-medium py-3 px-4 rounded-lg transition-all">
                    上一步
                </button>
                <button type="submit" id="resetBtn"
                    class="flex-1 bg-green-500 hover:bg-green-600 text-white font-medium py-3 px-4 rounded-lg transition-all">
                    <span id="btn2Text">重置密码</span>
                    <i class="fas fa-spinner fa-spin ml-2 hidden" id="loadingIcon2"></i>
                </button>
            </div>
        </form>

        <!-- 步骤3：完成 -->
        <div id="step3-success" class="text-center hidden">
            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-check text-green-600 text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">密码重置成功！</h2>
            <p class="text-gray-600 mb-6">您的密码已成功重置，现在可以使用新密码登录</p>
            <a href="/login" class="inline-block bg-green-500 hover:bg-green-600 text-white font-medium py-3 px-8 rounded-lg transition-all">
                <i class="fas fa-sign-in-alt mr-2"></i>前往登录
            </a>
        </div>

        <!-- 返回链接 -->
        <div class="mt-6 text-center">
            <a href="/login" class="text-gray-400 hover:text-gray-600 text-sm">
                <i class="fas fa-arrow-left mr-1"></i>返回登录
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        let currentUsername = '';

        // 更新步骤指示器
        function updateStepIndicator(step) {
            const steps = [1, 2, 3];
            steps.forEach((s, i) => {
                const indicator = document.getElementById(`step${s}-indicator`);
                const line = document.getElementById(`step${s}-line`);
                
                if (s < step) {
                    indicator.className = 'step-indicator completed w-8 h-8 rounded-full flex items-center justify-center text-sm font-medium';
                    indicator.innerHTML = '<i class="fas fa-check"></i>';
                    if (line) line.className = 'w-12 h-0.5 bg-green-500 mx-2';
                } else if (s === step) {
                    indicator.className = 'step-indicator active w-8 h-8 rounded-full flex items-center justify-center text-sm font-medium';
                    indicator.textContent = s;
                } else {
                    indicator.className = 'step-indicator inactive w-8 h-8 rounded-full flex items-center justify-center text-sm font-medium';
                    indicator.textContent = s;
                    if (line) line.className = 'w-12 h-0.5 bg-gray-300 mx-2';
                }
            });
        }

        // 切换步骤
        function goToStep(step) {
            document.getElementById('step1-form').classList.add('hidden');
            document.getElementById('step2-form').classList.add('hidden');
            document.getElementById('step3-success').classList.add('hidden');
            
            if (step === 1) {
                document.getElementById('step1-form').classList.remove('hidden');
            } else if (step === 2) {
                document.getElementById('step2-form').classList.remove('hidden');
            } else if (step === 3) {
                document.getElementById('step3-success').classList.remove('hidden');
            }
            
            updateStepIndicator(step);
        }

        // 步骤1：发送验证码
        document.getElementById('step1-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('sendCodeBtn').disabled = true;
            document.getElementById('btn1Text').textContent = '发送中...';
            document.getElementById('loadingIcon1').classList.remove('hidden');
            
            try {
                const response = await axios.post('/api/forgot-password/send-code', {
                    username: username
                });
                
                if (response.data.success) {
                    currentUsername = username;
                    
                    // 开发模式显示验证码
                    if (response.data.dev_mode) {
                        document.getElementById('dev-code-display').classList.remove('hidden');
                        document.getElementById('dev-code').textContent = response.data.code;
                    }
                    
                    // 自动进入下一步
                    goToStep(2);
                }
            } catch (error) {
                document.getElementById('errorMsg').classList.remove('hidden');
                document.getElementById('errorText').textContent = error.response?.data?.error || '发送失败';
            } finally {
                document.getElementById('sendCodeBtn').disabled = false;
                document.getElementById('btn1Text').textContent = '发送验证码';
                document.getElementById('loadingIcon1').classList.add('hidden');
            }
        });

        // 步骤2：重置密码
        document.getElementById('step2-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const code = document.getElementById('verificationCode').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            document.getElementById('errorMsg2').classList.add('hidden');
            document.getElementById('successMsg2').classList.add('hidden');
            
            // 验证密码确认
            if (newPassword !== confirmPassword) {
                document.getElementById('errorMsg2').classList.remove('hidden');
                document.getElementById('errorText2').textContent = '两次输入的密码不一致';
                return;
            }
            
            if (newPassword.length < 6) {
                document.getElementById('errorMsg2').classList.remove('hidden');
                document.getElementById('errorText2').textContent = '密码至少需要6个字符';
                return;
            }
            
            document.getElementById('resetBtn').disabled = true;
            document.getElementById('btn2Text').textContent = '重置中...';
            document.getElementById('loadingIcon2').classList.remove('hidden');
            
            try {
                const response = await axios.post('/api/forgot-password/reset', {
                    username: currentUsername,
                    code: code,
                    new_password: newPassword
                });
                
                if (response.data.success) {
                    goToStep(3);
                }
            } catch (error) {
                document.getElementById('errorMsg2').classList.remove('hidden');
                document.getElementById('errorText2').textContent = error.response?.data?.error || '重置失败';
            } finally {
                document.getElementById('resetBtn').disabled = false;
                document.getElementById('btn2Text').textContent = '重置密码';
                document.getElementById('loadingIcon2').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
