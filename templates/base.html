<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}羽毛球视频智能剪辑系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .progress-bar {
            background: linear-gradient(90deg, #10b981, #059669);
        }
        .btn-primary {
            background: linear-gradient(135deg, #10b981, #059669);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #059669, #047857);
            transform: translateY(-1px);
        }
        .video-container {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 导航栏 -->
    <nav class="gradient-bg shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <i class="fas fa-video text-white text-2xl mr-3"></i>
                    <h1 class="text-white text-xl font-bold">羽毛球视频智能剪辑系统</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <!-- 登录状态区域 -->
                    <div id="authSection" class="flex items-center space-x-3">
                        <!-- 未登录显示 -->
                        <div id="loginBtn" class="hidden">
                            <a href="/login" class="text-white hover:text-gray-200 text-sm font-medium px-3 py-1 rounded border border-white border-opacity-30 hover:bg-white hover:bg-opacity-10 transition-all">
                                <i class="fas fa-sign-in-alt mr-1"></i>登录
                            </a>
                        </div>
                        <!-- 已登录显示 -->
                        <div id="userInfo" class="hidden flex items-center space-x-3">
                            <div class="text-white text-sm">
                                <i class="fas fa-user mr-1"></i>
                                <span id="displayUsername"></span>
                            </div>
                            <a href="/admin" id="adminLink" class="hidden text-yellow-300 hover:text-yellow-200 text-sm">
                                <i class="fas fa-cog mr-1"></i>管理
                            </a>
                            <button onclick="logout()" class="text-white hover:text-gray-200 text-sm px-3 py-1 rounded border border-white border-opacity-30 hover:bg-white hover:bg-opacity-10 transition-all">
                                <i class="fas fa-sign-out-alt mr-1"></i>退出
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 进度指示器 -->
    <div class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-8">
                    <div class="flex items-center step-indicator" data-step="upload">
                        <div class="w-8 h-8 rounded-full bg-green-500 text-white flex items-center justify-center text-sm font-medium">
                            <i class="fas fa-upload"></i>
                        </div>
                        <span class="ml-2 text-sm font-medium text-gray-900">上传视频</span>
                    </div>
                    <div class="flex items-center step-indicator" data-step="detection">
                        <div class="w-8 h-8 rounded-full bg-gray-300 text-gray-600 flex items-center justify-center text-sm font-medium">
                            <i class="fas fa-brain"></i>
                        </div>
                        <span class="ml-2 text-sm font-medium text-gray-500">智能检测</span>
                    </div>
                    <div class="flex items-center step-indicator" data-step="player">
                        <div class="w-8 h-8 rounded-full bg-gray-300 text-gray-600 flex items-center justify-center text-sm font-medium">
                            <i class="fas fa-play"></i>
                        </div>
                        <span class="ml-2 text-sm font-medium text-gray-500">回合播放</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 主内容区 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- 功能特点 -->
    <div class="bg-white border-t mt-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="text-center">
                    <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center mx-auto mb-3">
                        <i class="fas fa-brain text-blue-600 text-xl"></i>
                    </div>
                    <h3 class="font-medium text-gray-900 mb-1">智能回合检测</h3>
                    <p class="text-sm text-gray-500">AI自动识别羽毛球回合，精准定位每个回合的起止时间</p>
                </div>
                <div class="text-center">
                    <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center mx-auto mb-3">
                        <i class="fas fa-cut text-green-600 text-xl"></i>
                    </div>
                    <h3 class="font-medium text-gray-900 mb-1">自动分割视频</h3>
                    <p class="text-sm text-gray-500">将完整比赛视频自动分割成单独的回合片段</p>
                </div>
                <div class="text-center">
                    <div class="w-12 h-12 bg-purple-100 rounded-lg flex items-center justify-center mx-auto mb-3">
                        <i class="fas fa-download text-purple-600 text-xl"></i>
                    </div>
                    <h3 class="font-medium text-gray-900 mb-1">便捷下载</h3>
                    <p class="text-sm text-gray-500">支持单独下载每个回合的视频片段</p>
                </div>
                <div class="text-center">
                    <div class="w-12 h-12 bg-orange-100 rounded-lg flex items-center justify-center mx-auto mb-3">
                        <i class="fas fa-globe text-orange-600 text-xl"></i>
                    </div>
                    <h3 class="font-medium text-gray-900 mb-1">在线处理</h3>
                    <p class="text-sm text-gray-500">无需下载软件，浏览器直接使用</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        // 更新步骤指示器
        function updateStepIndicator(currentStep) {
            const steps = ['upload', 'detection', 'player'];
            const stepIndex = steps.indexOf(currentStep);
            
            document.querySelectorAll('.step-indicator').forEach((indicator, index) => {
                const circle = indicator.querySelector('div');
                const text = indicator.querySelector('span');
                
                if (index <= stepIndex) {
                    circle.className = 'w-8 h-8 rounded-full bg-green-500 text-white flex items-center justify-center text-sm font-medium';
                    text.className = 'ml-2 text-sm font-medium text-gray-900';
                } else {
                    circle.className = 'w-8 h-8 rounded-full bg-gray-300 text-gray-600 flex items-center justify-center text-sm font-medium';
                    text.className = 'ml-2 text-sm font-medium text-gray-500';
                }
            });
        }

        // 更新登录状态显示
        function updateAuthStatus() {
            axios.get('/api/current_user')
                .then(response => {
                    const data = response.data;
                    const loginBtn = document.getElementById('loginBtn');
                    const userInfo = document.getElementById('userInfo');
                    const adminLink = document.getElementById('adminLink');
                    const displayUsername = document.getElementById('displayUsername');
                    
                    if (data.logged_in) {
                        loginBtn.classList.add('hidden');
                        userInfo.classList.remove('hidden');
                        displayUsername.textContent = data.user.username;
                        
                        // 如果是管理员，显示管理入口
                        if (data.user.role === 'admin') {
                            adminLink.classList.remove('hidden');
                        }
                    } else {
                        loginBtn.classList.remove('hidden');
                        userInfo.classList.add('hidden');
                        adminLink.classList.add('hidden');
                    }
                })
                .catch(error => {
                    console.error('获取登录状态失败:', error);
                });
        }

        // 退出登录
        function logout() {
            axios.post('/api/logout')
                .then(response => {
                    if (response.data.success) {
                        window.location.href = '/login';
                    }
                })
                .catch(error => {
                    window.location.href = '/login';
                });
        }

        // 页面加载时获取状态
        document.addEventListener('DOMContentLoaded', function() {
            updateAuthStatus();
            axios.get('/api/status')
                .then(response => {
                    updateStepIndicator(response.data.current_step);
                })
                .catch(error => {
                    console.error('获取状态失败:', error);
                });
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
