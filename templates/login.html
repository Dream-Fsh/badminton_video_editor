<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 羽毛球视频智能剪辑系统</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center">
    <div class="login-card rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4">
        <!-- Logo区域 -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-video text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">羽毛球视频智能剪辑系统</h1>
            <p class="text-gray-500 mt-2">用户登录</p>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-gray-700 text-sm font-medium mb-2">
                    <i class="fas fa-user mr-2 text-gray-400"></i>用户名
                </label>
                <input type="text" id="username" name="username" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-green-500 focus:ring-2 focus:ring-green-200 transition-all outline-none"
                    placeholder="请输入用户名">
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-medium mb-2">
                    <i class="fas fa-lock mr-2 text-gray-400"></i>密码
                </label>
                <div class="relative">
                    <input type="password" id="password" name="password" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-green-500 focus:ring-2 focus:ring-green-200 transition-all outline-none pr-12"
                        placeholder="请输入密码">
                    <button type="button" onclick="togglePassword()" 
                        class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between">
                <label class="flex items-center cursor-pointer">
                    <input type="checkbox" id="remember" class="w-4 h-4 text-green-500 rounded border-gray-300 focus:ring-green-500">
                    <span class="ml-2 text-sm text-gray-600">记住我</span>
                </label>
                <a href="/forgot-password" class="text-sm text-green-600 hover:text-green-700">忘记密码？</a>
            </div>

            <!-- 错误提示 -->
            <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span id="errorText"></span>
            </div>

            <!-- 成功提示 -->
            <div id="successMsg" class="hidden bg-green-50 border border-green-200 text-green-600 px-4 py-3 rounded-lg text-sm">
                <i class="fas fa-check-circle mr-2"></i>
                <span id="successText"></span>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-green-500 hover:bg-green-600 text-white font-medium py-3 px-4 rounded-lg transition-all transform hover:scale-[1.02] flex items-center justify-center">
                <span id="btnText">登 录</span>
                <i class="fas fa-spinner fa-spin ml-2 hidden" id="loadingIcon"></i>
            </button>
        </form>

        <!-- 注册链接 -->
        <div class="mt-6 text-center">
            <p class="text-gray-500 text-sm">
                还没有账户？
                <a href="/register" class="text-green-600 hover:text-green-700 font-medium">立即注册</a>
            </p>
        </div>

        <!-- 返回首页 -->
        <div class="mt-4 text-center">
            <a href="/" class="text-gray-400 hover:text-gray-600 text-sm">
                <i class="fas fa-home mr-1"></i>返回首页
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        // 密码显示/隐藏切换
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.className = 'fas fa-eye-slash';
            } else {
                passwordInput.type = 'password';
                eyeIcon.className = 'fas fa-eye';
            }
        }

        // 表单提交
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            // 隐藏之前的消息
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('successMsg').classList.add('hidden');
            
            // 显示加载状态
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('btnText').textContent = '登录中...';
            document.getElementById('loadingIcon').classList.remove('hidden');
            
            try {
                const response = await axios.post('/api/login', {
                    username: username,
                    password: password
                });
                
                if (response.data.success) {
                    document.getElementById('successMsg').classList.remove('hidden');
                    document.getElementById('successText').textContent = '登录成功！正在跳转...';
                    
                    // 根据用户角色跳转
                    setTimeout(() => {
                        if (response.data.user.role === 'admin') {
                            window.location.href = '/admin';
                        } else {
                            window.location.href = '/';
                        }
                    }, 500);
                }
            } catch (error) {
                document.getElementById('errorMsg').classList.remove('hidden');
                document.getElementById('errorText').textContent = error.response?.data?.error || '登录失败，请稍后重试';
            } finally {
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('btnText').textContent = '登 录';
                document.getElementById('loadingIcon').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
